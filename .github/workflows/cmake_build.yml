name: CMake Build CI
permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [ "main", "devops/code-coverage" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name : Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libopencv-dev ninja-build lcov

    - name: Configure CMake for testing
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build build

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure -C ${{env.BUILD_TYPE}}

    - name: Run tests for coverage
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Coverage
        cmake --build build
        ctest

    - name: Generate coverage report
      run: |
        lcov --capture --directory build --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/catch2/*' --output-file coverage.filtered

    - name: Coverage Badge
      uses: ImBIOS/lcov-coverage-badge@v1.0.1
      with:
        file: ./coverage.filtered